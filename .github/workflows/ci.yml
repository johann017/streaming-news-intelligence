name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ci-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ci-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Type check (mypy)
        run: python -m mypy shared/ services/ backend/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # mypy failures are informational, not blocking
