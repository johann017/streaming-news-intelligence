name: News Intelligence Pipeline

on:
  schedule:
    - cron: '*/7 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [run-pipeline]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 8  # Hard limit — prevents runaway jobs consuming quota

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache pip packages to avoid re-downloading on every run
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Cache HuggingFace embedding model (~22MB for all-MiniLM-L6-v2)
      # Key includes requirements hash so cache invalidates when model version changes
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-models-

      # Cache pipeline state (embedding cache, cursors, seen IDs, notified IDs)
      # Key is run-specific; restores from the most recent matching prefix
      # Bump the version suffix to invalidate the embedding cache after changing
      # how GDELT article bodies are built (removed theme codes from embeddings).
      - name: Restore pipeline state
        uses: actions/cache@v4
        with:
          path: data/
          key: pipeline-state-v2-${{ github.run_id }}
          restore-keys: |
            pipeline-state-v2-

      - name: Cache NLTK data
        uses: actions/cache@v4
        with:
          path: ~/nltk_data
          key: nltk-punkt-tab-v1

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run pipeline
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NOTIFICATION_SCORE_THRESHOLD: ${{ secrets.NOTIFICATION_SCORE_THRESHOLD }}
          RECENCY_HALF_LIFE_HOURS: ${{ secrets.RECENCY_HALF_LIFE_HOURS }}
        run: python backend/workers/pipeline.py

      # Upload data/ artifacts so you can inspect pipeline output without Firestore access
      - name: Upload pipeline artifacts
        if: always()  # Upload even if pipeline had non-critical failures
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: |
            data/events.json
            data/ranked_clusters.json
            data/pipeline_run_log.json
          retention-days: 3
          if-no-files-found: ignore

      # Send ntfy notification if the pipeline itself fails (critical stage error)
      - name: Notify on pipeline failure
        if: failure()
        run: |
          if [ -n "${{ secrets.NTFY_TOPIC }}" ]; then
            curl -s \
              -H "Title: Pipeline Failed" \
              -H "Priority: high" \
              -H "Tags: warning" \
              -d "Pipeline run ${{ github.run_id }} failed. Check Actions logs." \
              "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"
          fi
