name: Deploy Firestore Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/firestore.rules'
      - 'infra/firestore.indexes.json'
      - 'infra/firebase.json'

jobs:
  deploy-firestore:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules and indexes
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          cd infra
          firebase deploy --only firestore \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
